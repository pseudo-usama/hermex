site_name: Hermex
site_description: Drive ChatGPT and Gemini from Python — no API keys, no billing, just the free web UI.

theme:
  name: material
  logo: assets/logo.svg
  palette:
    - scheme: default
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_bases: true
            members_order: source
            docstring_style: sphinx

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Guides:
    - Gemini: guides/gemini.md
    - ChatGPT: guides/chatgpt.md
  - API Reference:
    - Scraper: api/scraper.md
    - Models: api/models.md
