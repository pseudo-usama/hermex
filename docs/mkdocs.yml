site_name: Hermex
site_url: https://hermex.usama.ai/
site_description: Drive ChatGPT and Gemini from Python — no API keys, no billing, just the free web UI.
repo_url: https://github.com/pseudo-usama/hermex
repo_name: pseudo-usama/hermex

docs_dir: content

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant
    - toc.follow
    - toc.permalink
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tooltips

markdown_extensions:
  - toc:
      permalink: true
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [".."]
      check_paths: true
  - admonition
  - pymdownx.details

copyright: Copyright &copy; 2026 Usama

extra:
  social:
    - icon: material/language-python
      link: https://pypi.org/project/hermex
      name: Hermex on PyPI
    - icon: fontawesome/brands/github
      link: https://github.com/pseudo-usama/hermex
      name: Hermex on GitHub
    - icon: material/auto-fix
      link: https://watermark.usama.ai
      name: Gemini Watermark Remover

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - social:
      cards_layout_dir: overrides/layouts
      cards_layout: hermex
  - mkdocstrings:
      handlers:
        python:
          paths: [..]  # `import hermex` resolves
          options:
            show_source: false
            show_bases: true
            show_root_heading: true
            show_symbol_type_toc: true
            show_symbol_type_heading: true
            members_order: source
            docstring_style: sphinx

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Guides:
    - Gemini: guides/gemini.md
    - ChatGPT: guides/chatgpt.md
  - API Reference:
    - Shared Interface: api/shared-interface.md
    - Gemini: api/gemini.md
    - ChatGPT: api/chatgpt.md
    - Models: api/models.md
    - Exceptions: api/exceptions.md
  - Changelog: changelog.md
