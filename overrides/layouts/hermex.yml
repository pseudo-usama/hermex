# Hermex social card layout: white background, teal accent stripe at top,
# H glyph + wordmark inline, large page title, description below.

definitions:
  - &background_color "#FFFFFF"
  - &accent_color "#2DD4BF"
  - &title_color "#0F172A"
  - &description_color "#6B7280"
  - &font_family Roboto

  - &page_title >-
      {{ page.meta.get('title', page.title) }}

  - &page_description >-
      {{ page.meta.get('description', config.site_description) }}

  - &page_title_with_site_name >-
      {%- if not page.is_homepage -%}
        {{ page.meta.get('title', page.title) }} - {{ config.site_name }}
      {%- else -%}
        {{ config.site_name }}
      {%- endif -%}

  - &favicon >-
      {{ config.docs_dir }}/assets/favicon.svg

tags:
  og:type: website
  og:title: *page_title_with_site_name
  og:description: *page_description
  og:image: "{{ image.url }}"
  og:image:type: "{{ image.type }}"
  og:image:width: "{{ image.width }}"
  og:image:height: "{{ image.height }}"
  og:url: "{{ page.canonical_url }}"
  twitter:card: summary_large_image
  twitter:title: *page_title_with_site_name
  twitter:description: *page_description
  twitter:image: "{{ image.url }}"

size: { width: 1200, height: 630 }
layers:

  # White background
  - background:
      color: *background_color

  # Teal accent stripe at top
  - size: { width: 1200, height: 12 }
    offset: { x: 0, y: 0 }
    background:
      color: *accent_color

  # H glyph (favicon)
  - size: { width: 60, height: 84 }
    offset: { x: 64, y: 80 }
    background:
      image: *favicon

  # "Hermex" wordmark text, inline next to glyph
  - size: { width: 400, height: 60 }
    offset: { x: 148, y: 92 }
    typography:
      content: "{{ config.site_name }}"
      align: start
      color: *title_color
      line:
        amount: 1
        height: 1.0
      font:
        family: *font_family
        style: Bold

  # Page title
  - size: { width: 1072, height: 200 }
    offset: { x: 64, y: 240 }
    typography:
      content: *page_title
      align: start
      color: *title_color
      line:
        amount: 2
        height: 1.2
      font:
        family: *font_family
        style: Bold

  # Page description
  - size: { width: 1072, height: 140 }
    offset: { x: 64, y: 440 }
    typography:
      content: *page_description
      align: start
      color: *description_color
      line:
        amount: 3
        height: 1.4
      font:
        family: *font_family
        style: Regular
